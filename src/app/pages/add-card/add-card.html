<div class="max-w-xl mx-auto px-4 py-12">
  <div class="flex items-center gap-4 mb-8">
    <a routerLink="/settings" class="p-2 bg-white/5 rounded-xl hover:bg-white/10 transition-colors text-white">
      <lucide-icon [name]="ArrowLeftIcon" class="w-5 h-5"></lucide-icon>
    </a>
    <h1 class="text-3xl font-black text-white uppercase tracking-tighter">{{ 'Añadir Tarjeta' | translate }}</h1>
  </div>

  <div class="bg-[rgb(33,36,37)] p-8 rounded-[2rem] border border-gray-800 shadow-2xl">
    <div
      class="flex items-center justify-center gap-2 mb-8 text-emerald-500 bg-emerald-500/10 py-3 rounded-xl border border-emerald-500/20">
      <lucide-icon [name]="LockIcon" class="w-4 h-4"></lucide-icon>
      <span class="text-xs font-black uppercase tracking-widest">{{ 'Conexión Segura' | translate }}</span>
    </div>

    @if (errorMessage()) {
    <div
      class="bg-red-500/10 text-red-500 border border-red-500/20 px-4 py-3 rounded-xl mb-6 text-xs uppercase tracking-widest font-bold text-center">
      {{ errorMessage() }}
    </div>
    }

    <form (submit)="handleSubmit($event)" class="space-y-6">
      <div>
        <label class="block text-[10px] font-black text-gray-500 uppercase tracking-widest mb-2">{{ 'Titular de la
          tarjeta' | translate }}</label>
        <input type="text" [(ngModel)]="titular" name="titular" required placeholder="JUAN PÉREZ"
          class="w-full bg-[rgb(23,25,25)] border border-gray-800 text-white rounded-xl px-4 py-3.5 focus:outline-none focus:border-emerald-500 uppercase transition-colors" />
      </div>

      <div>
        <label class="block text-[10px] font-black text-gray-500 uppercase tracking-widest mb-2">{{ 'Número de tarjeta'
          | translate }}</label>
        <input type="text" [(ngModel)]="numeroTarjeta" name="numeroTarjeta" required placeholder="0000 0000 0000 0000"
          maxlength="19"
          class="w-full bg-[rgb(23,25,25)] border border-gray-800 text-white rounded-xl px-4 py-3.5 focus:outline-none focus:border-emerald-500 font-mono transition-colors" />
      </div>

      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-[10px] font-black text-gray-500 uppercase tracking-widest mb-2">{{ 'Caducidad' |
            translate }}</label>
          <input type="text" [(ngModel)]="fechaExpiracion" name="fechaExpiracion" required placeholder="MM/YY"
            maxlength="5"
            class="w-full bg-[rgb(23,25,25)] border border-gray-800 text-white rounded-xl px-4 py-3.5 focus:outline-none focus:border-emerald-500 font-mono transition-colors" />
        </div>
        <div>
          <label class="block text-[10px] font-black text-gray-500 uppercase tracking-widest mb-2">CVV</label>
          <input type="password" [(ngModel)]="cvv" name="cvv" required placeholder="***" maxlength="4"
            class="w-full bg-[rgb(23,25,25)] border border-gray-800 text-white rounded-xl px-4 py-3.5 focus:outline-none focus:border-emerald-500 font-mono transition-colors" />
        </div>
      </div>

      <button type="submit" [disabled]="isLoading()"
        class="w-full bg-emerald-500 text-[rgb(23,25,25)] font-black py-4 rounded-xl hover:bg-emerald-400 transition-all uppercase tracking-widest text-xs mt-6 shadow-xl shadow-emerald-500/20 disabled:shadow-none disabled:bg-gray-800 disabled:text-gray-500">
        {{ isLoading() ? 'Guardando...' : 'Vincular Tarjeta' | translate }}
      </button>
    </form>
  </div>
</div>
