<div class="relative w-full max-w-6xl mx-auto group px-4">
  <button (click)="prev()"
    class="absolute left-6 top-1/2 -translate-y-1/2 z-20 bg-black/40 hover:bg-black/80 text-white p-4 rounded-full opacity-0 group-hover:opacity-100 transition-all duration-300 backdrop-blur-sm">
    <span class="text-3xl font-bold leading-none">‹</span>
  </button>

  <div #carousel
    class="flex overflow-x-hidden snap-x snap-mandatory scroll-smooth w-full rounded-[2rem] shadow-2xl bg-[rgb(23,25,25)] border border-gray-800">
    @for (dest of destinos; track dest.id) {
    <div class="w-full flex-shrink-0 snap-center cursor-pointer relative" (click)="goToDestination(dest)">
      <div class="aspect-[21/9] w-full relative overflow-hidden bg-gray-900">
        <img loading="lazy" [src]="dest.imagen || 'assets/placeholder.jpg'" [alt]="dest.nombre | translate"
          class="w-full h-full object-cover transition-transform duration-1000 hover:scale-110" />
        <div
          class="absolute inset-0 bg-gradient-to-t from-black/90 via-black/20 to-transparent flex items-end p-8 md:p-14">
          <div class="transform transition-all duration-500 w-full max-w-3xl">
            <span
              class="bg-emerald-500 text-[rgb(23,25,25)] text-xs font-black px-4 py-1.5 rounded-full mb-4 inline-block uppercase tracking-widest shadow-lg shadow-emerald-500/20">
              {{ dest.pais | translate }}
            </span>
            <h2 class="text-4xl md:text-6xl font-black text-white mb-3 drop-shadow-2xl uppercase tracking-tighter">
              {{ (dest.ciudad || dest.nombre) | translate }}
            </h2>
            <p class="text-gray-300 text-lg line-clamp-2 font-medium drop-shadow-md">
              {{ dest.descripcion | translate }}
            </p>
          </div>
        </div>
      </div>
    </div>
    }
  </div>

  <button (click)="next()"
    class="absolute right-6 top-1/2 -translate-y-1/2 z-20 bg-black/40 hover:bg-black/80 text-white p-4 rounded-full opacity-0 group-hover:opacity-100 transition-all duration-300 backdrop-blur-sm">
    <span class="text-3xl font-bold leading-none">›</span>
  </button>
</div>
