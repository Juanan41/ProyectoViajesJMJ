<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Recomendación</title>
    <style>
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body style="
    font-family: Arial;
    background:
        linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.9)),
        url('https://images.unsplash.com/photo-1465101046530-73398c7f28ca?q=80&w=1974&auto=format&fit=crop');
    background-size: cover;
    background-attachment: fixed;
    color: white;
    margin: 0;
    padding: 20px;
">
<div style="
    background: white;
    color: black;
    padding: 30px;
    border-radius: 15px;
    max-width: 65%;
    margin: auto;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
">

<h1>🌍 Tu destino recomendado es:</h1>

<h2 th:text="${destino}"></h2>

    <div style="margin-top:20px;">
        <img th:src="${imagen}" alt="Destino" style="
        width:100%;
        height:300px;
        object-fit: cover;
        border-radius:15px;
    ">
    </div>

<form th:action="@{/reservar}" method="post">

    <!-- SELECCIÓN HOTEL -->
    <input type="hidden" name="hotel" id="hotelSeleccionado" required>

    <!-- 🏨 HOTELES -->
    <h3>📅 Fechas del viaje</h3>

    <label>Entrada:</label>
    <input type="date" id="fechaEntrada" min="${#dates.format(#dates.createNow(), 'yyyy-MM-dd')}" onchange="recalcularDesdeFechas()">

    <label>Salida:</label>
    <input type="date" id="fechaSalida" onchange="recalcularDesdeFechas()">

    <h3>🏨 Elige hotel y habitación:</h3>

    <div id="hoteles">

        <!-- 🔥 ITERAMOS EL MAP -->
        <div th:each="entry : ${habitacionesPorHotel}" style="margin-bottom:15px;">

            <!-- CABECERA HOTEL -->
            <div onclick="toggleHotel(this)" style="
            background:#0072ff;
            color:white;
            padding:10px;
            border-radius:8px;
            cursor:pointer;
            font-weight:bold;
        ">
                🏨 <span th:text="${entry.key}"></span>
            </div>

            <!-- CONTENIDO DESPLEGABLE -->
            <div class="contenido-hotel" style="
            display:none;
            background:white;
            padding:10px;
            border-radius:8px;
            margin-top:5px;
        ">



                <!-- HABITACIONES -->
                <div th:each="h : ${entry.value}">
                    <label>
                        <input type="radio" name="habitacionId"
                               th:value="${h.id}"
                               th:data-img="${h.imagenUrl}"
                               th:data-precio="${h.precioPorNoche}"
                               required>

                        🛏️ <span th:text="${h.tipo}"></span> |
                        👥 <span th:text="${h.capacidad}"></span> |
                        💶 <span th:text="${h.precioPorNoche}"></span> € |
                        🍽️ <span th:text="${h.regimen.nombreBonito}"></span>
                    </label>
                    <br>
                </div>

            </div>
        </div>

    </div>

    <!-- 🖼️ IMAGEN DINÁMICA -->
    <div style="
        position: fixed;
        top: 120px;
        right: 40px;
        bottom: 2cm;
        width: 25%;
    ">
        <img id="previewHabitacion"
             src="https://images.unsplash.com/photo-1566665797739-1674de7a421a?q=80&w=800"
             style="
        width: 100%;
        height: 100%;
        object-fit: cover;
        border-radius:20px;
        box-shadow: 0 15px 40px rgba(0,0,0,0.5);
        transition: transform 0.3s ease;
     "
             onmouseover="this.style.transform='scale(1.05)'"
             onmouseout="this.style.transform='scale(1)'">
    </div>
    <div>
        <input type="hidden" name="destino" th:value="${destino}">
        <h3>🚆 Elige transporte:</h3>
        <label>💰 Presupuesto transporte:</label>
        <select id="presupuestoTransporte" name="presupuestoTransporte">
            <option value="100">Económico (100€)</option>
            <option value="300">Medio (300€)</option>
            <option value="700">Premium (700€)</option>
        </select>

        <select name="transporte" required>
            <option value="AVION">✈️ Avión</option>
            <option value="TREN">🚆 Tren</option>
            <option value="BARCO">🚢 Barco</option>
        </select>
    </div>

    <input type="hidden" name="noches" id="nochesHidden">

    <button style="margin-top:20px;">✈️ Reservar este viaje</button>

    <h3>💰 Precio total: <span id="precioTotal">--</span></h3>

</form>

<p><strong>Descripción:</strong> <span th:text="${descripcion}"></span></p>
<p><strong>Precio:</strong> <span th:text="${precio}"></span></p>

<div style="margin-top:20px;">
    <div th:if="${sugerencia != null and !#strings.isEmpty(sugerencia)}">
        <h3>📝 Tu sugerencia:</h3>
        <p th:text="${sugerencia}"></p>
    </div>
</div>

<!-- ⚡ SCRIPT -->
    <script>
        document.addEventListener("DOMContentLoaded", function () {

            document.getElementById("presupuestoTransporte").addEventListener("change", recalcularDesdeFechas);

            const radios = document.querySelectorAll('input[name="habitacionId"]');
            const img = document.getElementById('previewHabitacion');

            // 🎯 CUANDO CAMBIA HABITACIÓN
            radios.forEach(radio => {
                radio.addEventListener('change', function () {

                    // 🖼️ CAMBIAR IMAGEN
                    const nuevaImg = this.getAttribute('data-img');
                    img.src = nuevaImg;

                    // 💰 PRECIO DINÁMICO
                    // 💰 PRECIO DINÁMICO PRO

                    const precioNoche = parseFloat(this.getAttribute("data-precio"));

                    const fechaEntrada = document.getElementById("fechaEntrada").value;
                    const fechaSalida = document.getElementById("fechaSalida").value;

                    if (!fechaEntrada || !fechaSalida) {
                        document.getElementById("precioTotal").innerText = "Selecciona fechas";
                        return;
                    }

                    const inicio = new Date(fechaEntrada);
                    const fin = new Date(fechaSalida);

                    const diffTime = fin - inicio;
                    const noches = diffTime / (1000 * 60 * 60 * 24);

                    document.getElementById("nochesHidden").value = noches;

                    if (noches <= 0) {
                        document.getElementById("precioTotal").innerText = "Fechas inválidas";
                        return;
                    }

                    const transporte = parseFloat(document.getElementById("presupuestoTransporte").value);
                    const total = (noches * precioNoche) + transporte;

                    document.getElementById("precioTotal").innerText =
                        noches + " noches - " + total + "€";

                    // 🏨 SELECCIONAR HOTEL AUTOMÁTICO
                    const contenedor = this.closest('.contenido-hotel');


                    // 🔥 sacar nombre del hotel
                    const nombreHotel = contenedor.previousElementSibling.innerText.trim();

                    // 🔥 guardarlo en el hidden
                    document.getElementById("hotelSeleccionado").value = nombreHotel;
                });
            });
             // 🔥 AUTO SELECCIÓN PRO
                    const primerHotel = document.querySelector('.contenido-hotel');
                    if (primerHotel) {
                        primerHotel.style.display = 'block';

                        const primeraHabitacion = primerHotel.querySelector('input[name="habitacionId"]');
                        if (primeraHabitacion) {
                            primeraHabitacion.checked = true;
                            setTimeout(() => {
                                primeraHabitacion.dispatchEvent(new Event('change'));
                            }, 50);
                        }
                    }

        });

        // 🏨 ABRIR / CERRAR HOTEL
        function toggleHotel(element) {
            const all = document.querySelectorAll('.contenido-hotel');

            all.forEach(div => div.style.display = 'none');

            const contenido = element.nextElementSibling;
            contenido.style.display = 'block';
            contenido.style.animation = 'fadeIn 0.3s ease';
            element.style.background = '#0056cc'; // 🔥 resaltado
        }
        // 📆RECALCULAR FECHA
        function recalcularDesdeFechas() {

            const habitacionSeleccionada = document.querySelector('input[name="habitacionId"]:checked');

            if (!habitacionSeleccionada) return;

            const precioNoche = parseFloat(habitacionSeleccionada.getAttribute("data-precio"));

            const fechaEntrada = document.getElementById("fechaEntrada").value;
            const fechaSalida = document.getElementById("fechaSalida").value;

            if (!fechaEntrada || !fechaSalida) {
                document.getElementById("precioTotal").innerText = "Selecciona fechas";
                return;
            }

            const inicio = new Date(fechaEntrada);
            const fin = new Date(fechaSalida);

            const diffTime = fin - inicio;
            const noches = diffTime / (1000 * 60 * 60 * 24);

            if (noches <= 0) {
                document.getElementById("precioTotal").innerText = "Fechas inválidas";
                return;
            }

            const transporte = parseFloat(document.getElementById("presupuestoTransporte").value);
            const total = (noches * precioNoche) + transporte;

            document.getElementById("precioTotal").innerText =
                noches + " noches - " + total + "€";


        }


    </script>


<a href="/">Volver</a>

</div>
</body>
</html>
