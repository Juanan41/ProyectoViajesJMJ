<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Reserva de viaje</title>

    <link rel="stylesheet" th:href="@{/css/estancia.css}">
</head>

<body>

<!-- NAVBAR -->
    <div th:replace="~{fragments/navbar :: navbar}"></div>

<header>
    <h1>✈️ Reserva tu viaje</h1>
</header>

<main>

    <!-- DESTINO DINÁMICO -->
    <h2>Destino seleccionado:</h2>
    <h3 th:text="${destino}"></h3>

    <section class="formulario-viaje">

        <form th:action="@{/reservar}" method="post">

            <!-- oculto pero con valor dinámico -->
            <input type="hidden" name="destino" th:value="${destino}">

            <label>Hoteles disponibles:</label>
            <select name="hotel">
                <option value="3">Hotel 3⭐</option>
                <option value="4">Hotel 4⭐</option>
                <option value="5">Hotel 5⭐</option>
            </select>

            <label>Vuelos:</label>
            <select name="vuelo">
                <option value="economico">Vuelo Económico</option>
                <option value="ejecutivo">Vuelo Ejecutivo</option>
                <option value="premium">Vuelo Premium</option>
            </select>

            <button type="submit">Confirmar reserva</button>

        </form>

    </section>

    <!-- VOLVER -->
    <a th:href="@{/}" class="boton-volver">⬅️ Volver</a>

</main>

<footer>
    <p>© 2025 Viajes JMJ</p>
</footer>

<script th:src="@{/js/estancia.js}"></script>

</body>
</html>
