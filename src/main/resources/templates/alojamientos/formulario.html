<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Nuevo Alojamiento</title>
</head>
<body>

<h1>Nuevo Alojamiento</h1>

<form th:action="@{/alojamientos}" th:object="${alojamiento}" method="post">

    <label>Nombre:</label>
    <input type="text" th:field="*{nombre}" /><br/>

    <label>Ciudad:</label>
    <input type="text" th:field="*{ciudad}" /><br/>

    <label>País:</label>
    <input type="text" th:field="*{pais}" /><br/>

    <label>Tipo:</label>
    <input type="text" th:field="*{tipo}" /><br/>

    <label>Precio:</label>
    <input type="number" step="0.01" th:field="*{precioPorNoche}" /><br/>

    <button type="submit">Guardar</button>

</form>

</body>
</html>
