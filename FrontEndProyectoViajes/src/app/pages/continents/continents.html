<div class="flex-1 w-full bg-[rgb(33,36,37)] min-h-screen">
  <div class="max-w-7xl mx-auto px-4 py-12">
    <div class="text-center mb-12">
      <h1 class="text-5xl font-bold text-white mb-4"> {{ 'Explora el Mundo' | translate }} </h1>
      <p class="text-gray-400 text-lg"> {{ 'Selecciona un continente para descubrir destinos increíbles' | translate }}
      </p>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
      <a *ngFor="let continent of continents" [routerLink]="['/continent', continent.id]"
        class="group relative h-80 cursor-pointer rounded-2xl overflow-hidden border border-gray-800 hover:border-gray-600 transition-all shadow-xl">
        <img loading="lazy" [src]="continent.image" [alt]="continent.name"
          class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500" />
        <div
          class="absolute inset-0 bg-gradient-to-t from-black via-black/60 to-transparent flex flex-col justify-end p-6">
          <h2 class="text-3xl font-bold text-white mb-2 group-hover:translate-x-2 transition-transform">
            {{ continent.name | translate }}
          </h2>
          <p class="text-gray-300 mb-4">{{ continent.description | translate }}</p>
          <div class="flex items-center gap-2 text-white group-hover:gap-3 transition-all">
            <span class="text-sm font-medium"> {{ 'Explorar' | translate }} </span>
            <lucide-icon [name]="ChevronRightIcon" class="w-5 h-5"></lucide-icon>
          </div>
        </div>
      </a>
    </div>
  </div>
</div>
