<div class="flex-1 w-full bg-[rgb(23,25,25)] min-h-screen">
  <div class="max-w-7xl mx-auto px-4 py-12">
    <div class="flex items-center gap-4 mb-12">
      <a routerLink="/"
        class="p-3 bg-[rgb(33,36,37)] border border-gray-800 text-white rounded-2xl hover:bg-gray-800 transition-all">
        <lucide-icon [name]="ArrowLeftIcon" class="w-6 h-6"></lucide-icon>
      </a>
      <div>
        <h1 class="text-3xl font-bold text-white tracking-tight">{{ countryName() | translate }}</h1>
        <p class="text-gray-500 text-sm">{{ 'Explora los mejores destinos en este país' | translate }}</p>
      </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
      @for (city of cities(); track city.id) {
      <div [routerLink]="['/hotels', city.id]"
        class="group bg-[rgb(33,36,37)] rounded-[32px] overflow-hidden border border-gray-800 hover:border-emerald-500/30 transition-all duration-500 cursor-pointer">
        <div class="relative h-64 overflow-hidden">
          <img [src]="city.imagen" [alt]="city.nombre"
            class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110" />
          <div class="absolute inset-0 bg-gradient-to-t from-[rgb(33,36,37)] via-transparent to-transparent"></div>
        </div>
        <div class="p-8">
          <h3 class="text-2xl font-bold text-white mb-2 group-hover:text-emerald-400 transition-colors">{{ city.nombre |
            translate }}</h3>
          <p class="text-gray-400 text-sm mb-6 line-clamp-2">{{ city.descripcion | translate }}</p>
          <div class="flex items-center justify-between pt-6 border-t border-gray-800">
            <span class="text-emerald-500 font-bold text-xl">{{ city.precio }}€</span>
            <lucide-icon [name]="ChevronRightIcon"
              class="w-6 h-6 text-gray-500 group-hover:text-emerald-500 transition-all"></lucide-icon>
          </div>
        </div>
      </div>
      }
    </div>
  </div>
</div>
