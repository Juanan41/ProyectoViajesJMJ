<div class="flex-1 w-full flex items-center justify-center p-4">
  <div class="w-full max-w-md bg-[rgb(23,25,25)] p-8 rounded-2xl shadow-xl border border-gray-800">
    <div class="text-center mb-8">
      <h1 class="text-3xl font-bold tracking-tight mb-2"> {{ 'Comienza tu viaje' | translate }} </h1>
      <p class="text-gray-400 text-sm"> {{ 'Crea una cuenta para descubrir el mundo.' | translate }} </p>
    </div>

    <!-- Error message -->
    <div *ngIf="error"
      class="mb-6 p-4 bg-red-500/10 border border-red-500/50 rounded-lg text-red-500 text-sm font-medium text-center">
      {{ error }}
    </div>

    <form (submit)="handleSubmit($event)" class="space-y-6">
      <div class="space-y-2">
        <label class="text-sm font-medium text-gray-300 block" for="name"> {{ 'Nombre' | translate }} </label>
        <input type="text" id="name" name="name" [(ngModel)]="name" required
          class="w-full bg-[rgb(33,36,37)] border border-gray-700 text-white rounded-lg px-4 py-3 placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-white transition-all shadow-inner"
          [placeholder]="'Tu Nombre' | translate" />
      </div>

      <div class="space-y-2">
        <label class="text-sm font-medium text-gray-300 block" for="email"> {{ 'Correo electrónico' | translate }}
        </label>
        <input type="email" id="email" name="email" [(ngModel)]="email" required
          class="w-full bg-[rgb(33,36,37)] border border-gray-700 text-white rounded-lg px-4 py-3 placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-white transition-all shadow-inner"
          [placeholder]="'tu@email.com' | translate" />
      </div>

      <div class="space-y-2">
        <label class="text-sm font-medium text-gray-300 block" for="password"> {{ 'Contraseña' | translate }} </label>
        <input type="password" id="password" name="password" [(ngModel)]="password" required
          class="w-full bg-[rgb(33,36,37)] border border-gray-700 text-white rounded-lg px-4 py-3 placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-white transition-all shadow-inner"
          [placeholder]="'••••••••' | translate" />
      </div>

      <div class="space-y-2">
        <label class="text-sm font-medium text-gray-300 block" for="confirmPassword"> {{ 'Confirma Contraseña' |
          translate }} </label>
        <input type="password" id="confirmPassword" name="confirmPassword" [(ngModel)]="confirmPassword" required
          class="w-full bg-[rgb(33,36,37)] border border-gray-700 text-white rounded-lg px-4 py-3 placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-white transition-all shadow-inner"
          [placeholder]="'••••••••' | translate" />
      </div>

      <button type="submit"
        class="w-full bg-white text-black font-bold text-lg rounded-lg py-3 hover:bg-gray-200 transition-colors shadow-lg mt-4 cursor-pointer outline-none focus:ring-2 focus:ring-white focus:ring-offset-2 focus:ring-offset-[rgb(23,25,25)]">
        {{ 'Registrarse' | translate }} </button>
    </form>

    <div class="mt-8 text-center text-sm text-gray-400">
      {{ '¿Ya tienes una cuenta?' | translate }} <a routerLink="/login" class="text-white hover:underline transition-all"> {{ 'Iniciar
        sesión' | translate }} </a>
    </div>
  </div>
</div>
