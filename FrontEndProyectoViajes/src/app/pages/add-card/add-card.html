<div class="flex-1 w-full max-w-4xl mx-auto p-4 py-8">
  <a routerLink="/settings"
    class="flex items-center gap-2 text-gray-400 hover:text-white transition-colors mb-8 cursor-pointer">
    <lucide-icon [name]="ArrowLeftIcon" class="w-4 h-4"></lucide-icon> {{ 'Volver a configuración' | translate }}
  </a>

  <div class="grid grid-cols-1 lg:grid-cols-2 gap-12 items-start">
    <!-- Form -->
    <div class="bg-[rgb(23,25,25)] p-8 rounded-3xl border border-gray-800 shadow-xl">
      <h1 class="text-2xl font-bold mb-6">{{ 'Añadir Tarjeta' | translate }}</h1>

      <form class="space-y-5" (submit)="handleAddCard($event)">
        <!-- Número de Tarjeta -->
        <div>
          <label class="text-sm font-medium text-gray-300 block mb-1.5">{{ 'Número de Tarjeta' | translate }}</label>
          <div class="relative">
            <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400">
              <lucide-icon [name]="CardIconType" class="w-5 h-5"></lucide-icon>
            </span>
            <input type="text" placeholder="0000 0000 0000 0000" maxlength="19" [ngModel]="cardNumber"
              (input)="handleCardNumberChange($event)" name="cardNumber"
              class="w-full bg-[rgb(33,36,37)] text-white border border-gray-700 rounded-xl py-3 pl-10 pr-4 focus:outline-none focus:border-white focus:ring-1 focus:ring-white transition-all font-mono"
              required />
          </div>
        </div>

        <!-- Nombre de Tarjeta -->
        <div>
          <label class="text-sm font-medium text-gray-300 block mb-1.5">{{ 'Titular de la Tarjeta' | translate
            }}</label>
          <input type="text" placeholder="JUAN PÉREZ" maxlength="40" [(ngModel)]="cardHolder"
            (ngModelChange)="cardHolder = $event.toUpperCase()" name="cardHolder"
            class="w-full bg-[rgb(33,36,37)] text-white border border-gray-700 rounded-xl py-3 px-4 focus:outline-none focus:border-white focus:ring-1 focus:ring-white transition-all uppercase"
            required />
        </div>

        <!-- Fecha y CVV -->
        <div class="grid grid-cols-2 gap-5">
          <div>
            <label class="text-sm font-medium text-gray-300 block mb-1.5">{{ 'Expiración' | translate }}</label>
            <input type="text" placeholder="MM/AA" maxlength="5" [ngModel]="expiry"
              (ngModelChange)="handleExpiryChange($event)" name="expiry"
              class="w-full bg-[rgb(33,36,37)] text-white border border-gray-700 rounded-xl py-3 px-4 focus:outline-none focus:border-white focus:ring-1 focus:ring-white transition-all font-mono"
              required />
          </div>
          <div>
            <label class="text-sm font-medium text-gray-300 block mb-1.5">{{ 'CVV' | translate }}</label>
            <input type="password" placeholder="123" [ngModel]="cvv" maxlength="3"
              (ngModelChange)="handleCvvChange($event)" name="cvv"
              class="w-full bg-[rgb(33,36,37)] text-white border border-gray-700 rounded-xl py-3 px-4 focus:outline-none focus:border-white focus:ring-1 focus:ring-white transition-all font-mono"
              required />
          </div>
        </div>

        <button type="submit"
          class="w-full bg-white text-black font-semibold rounded-xl py-3.5 hover:bg-gray-200 transition-colors mt-6 cursor-pointer disabled:opacity-50 disabled:cursor-not-allowed"
          [disabled]="!isValid">
          {{ 'Guardar Tarjeta' | translate }}
        </button>
      </form>
    </div>

    <!-- Tarjeta -->
    <div class="flex justify-center lg:sticky lg:top-28">
      <div
        class="w-full max-w-sm aspect-[1.586/1] rounded-2xl relative overflow-hidden shadow-2xl transition-all duration-300">
        <!-- Card Background -->
        <div class="absolute inset-0 bg-gradient-to-tr from-gray-900 via-gray-800 to-gray-600"></div>

        <!-- Ambient glows -->
        <div class="absolute top-0 right-0 w-48 h-48 bg-white/5 rounded-full blur-3xl -translate-y-1/2 translate-x-1/2">
        </div>
        <div
          class="absolute bottom-0 left-0 w-32 h-32 bg-black/20 rounded-full blur-2xl translate-y-1/2 -translate-x-1/4">
        </div>

        <div class="absolute inset-0 p-6 flex flex-col justify-between text-white/90">
          <!-- Card Header (Chip & Logo) -->
          <div class="flex justify-between items-start">
            <div
              class="w-12 h-10 bg-gradient-to-br from-yellow-200 to-yellow-500 rounded-md flex flex-col justify-between p-1 opacity-90 shadow-sm border border-yellow-600/30">
              <div class="w-full h-px bg-yellow-700/30"></div>
              <div class="w-full h-px bg-yellow-700/30"></div>
              <div class="w-full h-px bg-yellow-700/30"></div>
            </div>
            <!-- Virtual logo -->
            <div class="text-xl font-black italic opacity-80 flex">
              <div class="w-8 h-8 rounded-full bg-red-500/80 mix-blend-screen relative -mr-3"></div>
              <div class="w-8 h-8 rounded-full bg-orange-500/80 mix-blend-screen relative"></div>
            </div>
          </div>

          <!-- Card Body (Number) -->
          <div class="mt-8">
            <p class="font-mono text-2xl tracking-[0.2em] font-medium min-h-[32px] drop-shadow-md">
              {{ cardNumber || '0000 0000 0000 0000' }}
            </p>
          </div>

          <!-- Card Footer -->
          <div class="flex justify-between items-end">
            <div>
              <p class="text-[10px] uppercase tracking-widest text-gray-400 mb-0.5">{{ 'Card Holder' | translate }}</p>
              <p class="font-bold tracking-wide uppercase min-w-[120px] min-h-[24px]">
                {{ cardHolder || 'Tu Nombre' }}
              </p>
            </div>
            <div>
              <p class="text-[10px] uppercase tracking-widest text-gray-400 mb-0.5">{{ 'Valid Thru' | translate }}</p>
              <p class="font-mono tracking-widest font-medium text-right min-h-[24px]">
                {{ expiry || 'MM/AA' }}
              </p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
