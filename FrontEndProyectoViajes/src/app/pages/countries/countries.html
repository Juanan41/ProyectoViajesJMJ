<div *ngIf="!continent" class="flex-1 flex flex-col items-center justify-center">
  <p class="text-gray-400 mb-4"> {{ 'Continente no encontrado' | translate }} </p>
  <a routerLink="/continents" class="text-white hover:underline flex items-center gap-2">
    <lucide-icon [img]="ArrowLeftIcon" class="w-4 h-4"></lucide-icon> {{ 'Volver a continentes' | translate }} </a>
</div>

<div *ngIf="continent" class="flex-1 w-full bg-[rgb(33,36,37)] min-h-screen">
  <div class="max-w-7xl mx-auto px-4 py-12">
    <a routerLink="/continents"
      class="inline-flex items-center gap-2 text-gray-400 hover:text-white mb-8 transition-colors">
      <lucide-icon [img]="ArrowLeftIcon" class="w-4 h-4"></lucide-icon> {{ 'Volver a continentes' | translate }} </a>

    <div class="text-center mb-12">
      <h1 class="text-5xl font-bold text-white mb-4">{{ continent.name | translate }}</h1>
      <p class="text-gray-400 text-lg">{{ continent.description | translate }}</p>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
      <a *ngFor="let country of countries" [routerLink]="['/country', country.id]"
        class="group relative h-72 rounded-2xl overflow-hidden border border-gray-800 hover:border-gray-600 transition-all shadow-xl">
        <img loading="lazy" [src]="country.image" [alt]="country.name"
          class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500" />
        <div
          class="absolute inset-0 bg-gradient-to-t from-black via-black/60 to-transparent flex flex-col justify-end p-6">
          <h2
            class="text-2xl font-bold text-white mb-2 flex items-center gap-2 group-hover:translate-x-2 transition-transform">
            <img loading="lazy" [src]="getFlagUrl(country.id)" alt="Flag" class="w-8 aspect-auto rounded-sm shadow-sm"
              *ngIf="getFlagUrl(country.id)" />
            <span *ngIf="!getFlagUrl(country.id)">{{ country.flag }}</span>
            {{ country.name | translate }}
          </h2>
          <div class="text-white text-sm font-medium flex items-center gap-2 mt-2"> {{ 'Ver ciudades' | translate }}
            <lucide-icon [img]="ChevronRightIcon" class="w-4 h-4"></lucide-icon>
          </div>
        </div>
      </a>
    </div>
  </div>
</div>
