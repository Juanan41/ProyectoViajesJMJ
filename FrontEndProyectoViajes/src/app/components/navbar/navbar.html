<nav class="w-full border-b border-white/5 bg-[rgb(23,25,25)]/80 backdrop-blur-md sticky top-0 z-50">
  <div class="max-w-7xl mx-auto px-4 h-20 flex items-center justify-between">
    <a routerLink="/" class="flex items-center gap-2 group">
      <div
        class="w-10 h-10 bg-emerald-500 rounded-xl flex items-center justify-center shadow-lg shadow-emerald-500/20 group-hover:scale-110 transition-transform">
        <lucide-icon [name]="MapIcon" class="w-6 h-6 text-[rgb(23,25,25)]"></lucide-icon>
      </div>
      <span class="text-xl font-black text-white tracking-tighter uppercase">Viajes<span
          class="text-emerald-500">JMJ</span></span>
    </a>

    <div class="hidden md:flex items-center gap-8">
      <a routerLink="/"
        class="text-xs font-bold text-gray-400 hover:text-white uppercase tracking-widest transition-colors">{{ 'Inicio'
        | translate }}</a>
      <a routerLink="/trips"
        class="text-xs font-bold text-gray-400 hover:text-white uppercase tracking-widest transition-colors">{{ 'Mis
        Viajes' | translate }}</a>
    </div>

    <div class="flex items-center gap-4">
      @if (!auth.isLoggedIn()) {
      <a routerLink="/login"
        class="text-xs font-bold text-white uppercase tracking-widest px-6 py-3 border border-white/10 rounded-2xl hover:bg-white/5 transition-all">
        {{ 'Entrar' | translate }}
      </a>
      <a routerLink="/register"
        class="text-xs font-bold text-[rgb(23,25,25)] bg-emerald-500 uppercase tracking-widest px-6 py-3 rounded-2xl hover:bg-emerald-400 transition-all shadow-lg shadow-emerald-500/10">
        {{ 'Registro' | translate }}
      </a>
      } @else {
      <div class="flex items-center gap-3 pl-4 border-l border-white/10">
        <div class="text-right mr-2 hidden sm:block">
          <p class="text-[10px] font-black text-emerald-500 uppercase tracking-widest">USUARIO</p>
          <p class="text-xs font-bold text-white">{{ auth.user()?.name }}</p>
        </div>
        <a routerLink="/profile"
          class="w-10 h-10 rounded-xl bg-white/5 flex items-center justify-center text-gray-400 hover:text-emerald-500 border border-white/5 transition-all">
          <lucide-icon [name]="UserIcon" class="w-5 h-5"></lucide-icon>
        </a>
        <button (click)="auth.logout()"
          class="w-10 h-10 rounded-xl bg-red-500/10 flex items-center justify-center text-red-500 border border-red-500/10 hover:bg-red-500 hover:text-white transition-all">
          <lucide-icon [name]="LogOutIcon" class="w-5 h-5"></lucide-icon>
        </button>
      </div>
      }
    </div>
  </div>
</nav>
