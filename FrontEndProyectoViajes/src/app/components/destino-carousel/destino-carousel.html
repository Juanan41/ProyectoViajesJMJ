<div class="relative w-full max-w-5xl mx-auto group px-4">
  <button (click)="prev()"
    class="absolute left-6 top-1/2 -translate-y-1/2 z-20 bg-black/40 hover:bg-black/60 text-white p-3 rounded-full opacity-0 group-hover:opacity-100 transition-all duration-300">
    <i-lucide name="chevron-left" class="w-6 h-6"></i-lucide>
  </button>

  <div #carousel
    class="flex overflow-x-hidden snap-x snap-mandatory scroll-smooth w-full rounded-3xl shadow-2xl bg-gray-800">
    @for (dest of destinos; track dest.id) {
    <div class="w-full flex-shrink-0 snap-center cursor-pointer relative" (click)="goToDestination(dest)">
      <div class="aspect-[21/9] w-full relative overflow-hidden">
        <img [src]="dest.imagen || 'public/placeholder.jpg'" [alt]="dest.nombre"
          class="w-full h-full object-cover transition-transform duration-700 hover:scale-110" />
        <div
          class="absolute inset-0 bg-gradient-to-t from-black/90 via-black/20 to-transparent flex items-end p-8 md:p-12">
          <div class="transform transition-all duration-500">
            <span
              class="bg-blue-600 text-white text-xs font-bold px-3 py-1 rounded-full mb-4 inline-block uppercase tracking-widest">
              {{ dest.pais | translate }}
            </span>
            <h2 class="text-4xl md:text-6xl font-black text-white mb-2 drop-shadow-lg">
              {{ dest.nombre }}
            </h2>
            <p class="text-gray-300 text-lg max-w-xl line-clamp-2">
              {{ dest.descripcion | translate }}
            </p>
          </div>
        </div>
      </div>
    </div>
    }
  </div>

  <button (click)="next()"
    class="absolute right-6 top-1/2 -translate-y-1/2 z-20 bg-black/40 hover:bg-black/60 text-white p-3 rounded-full opacity-0 group-hover:opacity-100 transition-all duration-300">
    <i-lucide name="chevron-right" class="w-6 h-6"></i-lucide>
  </button>
</div>
